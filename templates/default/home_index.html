<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatGPT Archives</title>

<style>
:root {
  --bg-top: #101116;
  --bg-bottom: #1d2028;
  --panel: rgba(255, 255, 255, 0.055);
  --panel-hover: rgba(255, 255, 255, 0.095);
  --text: #f4f5fb;
  --soft: #bfc4d2;
  --muted: #8f96a8;
  --accent: #9a9fbd;
  --border: rgba(255, 255, 255, 0.11);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  font-family: "Segoe UI", system-ui, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(138, 144, 168, 0.18), transparent 360px),
    linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
}

.page {
  width: min(1280px, calc(100% - 96px));
  margin: 0 auto;
  padding: 70px 0;
}

.hero {
  text-align: center;
  margin-bottom: 64px;
}

.hero-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 24px;
  display: grid;
  place-items: center;
  border-radius: 24px;
  background: var(--panel);
  border: 1px solid var(--border);
  font-size: 2rem;
}

.hero-label {
  margin: 0 0 14px;
  color: var(--muted);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
}

h1 {
  margin: 0 0 18px;
  font-size: clamp(3rem, 7vw, 5.8rem);
  line-height: 0.95;
  letter-spacing: -0.06em;
}

.hero p {
  max-width: 720px;
  margin: 0 auto;
  color: var(--soft);
  line-height: 1.7;
  font-size: 1.08rem;
}

.section-title {
  margin: 0 0 22px;
  color: var(--soft);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 0.85rem;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 22px;
}

li {
  margin: 0;
}

li a {
  min-height: 128px;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 26px;
  border-radius: 22px;
  color: var(--text);
  background: var(--panel);
  border: 1px solid var(--border);
  text-decoration: none;
  box-shadow: 0 16px 35px rgba(0, 0, 0, 0.22);
  transition: 0.2s ease;
  backdrop-filter: blur(10px);
  font-size: 1.45rem;
  font-weight: 700;
  line-height: 1.2;
}

li a::before {
  content: "📁";
  flex: 0 0 auto;
  font-size: 2rem;
}

li a:hover {
  background: var(--panel-hover);
  border-color: var(--accent);
  transform: translateY(-3px);
}

.footer-note {
  margin-top: 58px;
  color: var(--muted);
  font-size: 0.92rem;
}

@media (max-width: 760px) {
  .page {
    width: min(100% - 32px, 1280px);
    padding: 44px 0;
  }

  .hero {
    text-align: left;
    margin-bottom: 42px;
  }

  .hero-icon {
    margin-left: 0;
  }

  ul {
    grid-template-columns: 1fr;
  }

  li a {
    min-height: 104px;
    font-size: 1.25rem;
  }
}
</style>
</head>

<body>
<div class="page">

  <header class="hero">
    <div class="hero-icon">▦</div>
    <p class="hero-label">Local memory vault</p>
    <h1>ChatGPT Archives</h1>
    <p>A local-first archive for exported ChatGPT conversations. Organize folders, browse saved chats, and keep everything on your own machine.</p>
  </header>

  <main>
    <p class="section-title">Browse archive</p>

    <!-- AUTO-GENERATED-LINKS-START -->
    <ul>
      <li><a href="TITRE/index.html">TITRE</a></li>
    </ul>
    <!-- AUTO-GENERATED-LINKS-END -->

    <p class="footer-note">Generated locally. Stored on your machine.</p>
  </main>

</div>
</body>
</html>
